<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Order management - Medi nt</title>
  <link rel="stylesheet" href="/pages/shared/css/common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <script src="/config.js"></script>
</head>

<body>

  <div class="dashboard-layout">
    <aside class="sidebar">

      <header class="sidebar-header">
        <a href="/" class="logo">
          <img src="/pages/assets/medint-logo.png" alt="Mediant" width="180" height="60">
        </a>
        <hr>
      </header>

      <nav class="sidebar-nav">
        <ul>

          <li class="inventory active">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-package2-icon lucide-package-2">
                <path d="M12 3v6" />
                <path
                  d="M16.76 3a2 2 0 0 1 1.8 1.1l2.23 4.479a2 2 0 0 1 .21.891V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.472a2 2 0 0 1 .211-.894L5.45 4.1A2 2 0 0 1 7.24 3z" />
                <path d="M3.054 9.013h17.893" />
              </svg>
            </span>
            Inventory
          </li>

          <li class="order">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-notebook-text-icon lucide-notebook-text">
                <path d="M2 6h4" />
                <path d="M2 10h4" />
                <path d="M2 14h4" />
                <path d="M2 18h4" />
                <rect width="16" height="20" x="4" y="2" rx="2" />
                <path d="M9.5 8h5" />
                <path d="M9.5 12H16" />
                <path d="M9.5 16H14" />
              </svg>
            </span>
            Orders
          </li>

          <li class="history">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-history-icon lucide-history">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M12 7v5l4 2" />
              </svg>
            </span>
            Order History
          </li>

          <li class="supplier">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-truck-icon lucide-truck">
                <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2" />
                <path d="M15 18H9" />
                <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14" />
                <circle cx="17" cy="18" r="2" />
                <circle cx="7" cy="18" r="2" />
              </svg>
            </span>
            Suppliers
          </li>

          <li class="setting">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-settings-icon lucide-settings">
                <path
                  d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </span>
            Settings
          </li>

        </ul>
      </nav>

      <footer class="sidebar-footer">
        <button class="btn btn-danger">Logout</button>
      </footer>
    </aside>

    <main class="content">

      <section class="topbar">
        <div>
          <h2>Purchase Orders</h2>
          <p>Medicines that need to be reordered.</p>
        </div>
      </section>

      <section class="stats">

        <div class="stat-card">
          <h3>Pending Orders</h3>
          <p class="pending"></p>
        </div>

        <div class="stat-card">
          <h3>Sent Orders</h3>
          <p class="send"></p>
        </div>

      </section>

      <section class="table-section">

        <table>

          <caption>Supplier Orders</caption>

          <thead>
            <tr>
              <th>Id</th>
              <th>Medicine</th>
              <th>Current Stock</th>
              <th>Order Qty</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="table">

            <tr>
              <td>1</td>
              <td>Dexorange</td>
              <td class="low-stock">5</td>
              <td>
                <input type="number" value="20" class="order-qty">
              </td>
              <td>
                <span class="status status-pending"></span>
              </td>
            </tr>

          </tbody>
        </table>
      </section>

      <section class="table-actions">
        <button class="btn-whatsapp">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="20" height="20" fill="currentColor">
            <path
              d="M16.001 3C8.82 3 3 8.82 3 16c0 2.545.74 5.021 2.143 7.143L3 29l5.998-2.097A12.948 12.948 0 0 0 16.001 29C23.18 29 29 23.18 29 16S23.18 3 16.001 3zm0 23.667c-2.09 0-4.133-.56-5.92-1.62l-.424-.252-3.56 1.244 1.193-3.47-.276-.447A10.6 10.6 0 1 1 16 26.667zm5.815-7.96c-.318-.159-1.88-.928-2.171-1.034-.292-.106-.504-.159-.716.159-.212.318-.822 1.034-1.008 1.246-.186.212-.372.239-.69.08-.318-.159-1.343-.495-2.558-1.58-.946-.844-1.585-1.886-1.771-2.204-.186-.318-.02-.49.14-.649.144-.143.318-.372.477-.557.159-.186.212-.318.318-.53.106-.212.053-.398-.027-.557-.08-.159-.716-1.723-.981-2.36-.258-.62-.52-.536-.716-.546l-.61-.01c-.212 0-.557.08-.849.398-.292.318-1.114 1.088-1.114 2.652s1.14 3.074 1.299 3.286c.159.212 2.244 3.426 5.437 4.802.76.328 1.354.524 1.817.67.764.243 1.46.209 2.01.127.613-.091 1.88-.768 2.145-1.51.265-.742.265-1.378.186-1.51-.08-.133-.292-.212-.61-.371z" />
          </svg>
          Send Order
        </button>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="/pages/order/order.js"></script>
  <script type="module" src="/pages/shared/js/auth.js"></script>
  <script type="module" src="/pages/shared/js/navigate.js"></script>
</body>

</html>
