<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Medi nt</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <header>
        <a href="/" class="logo">
            <img
                src="../assets/medint-logo.png"
                alt="Mediant Logo"
                width="180"
                height="60">
        </a>
    </header>

    <main>
        <section class="register-container">

            <h1>Create Your Account</h1>

            <form
                id="register-form" class="register-form"
                action="/register"
                method="POST">

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        placeholder="Taukeer Ahmad"
                        autocomplete="name"
                        maxlength="100"
                        required>
                </div>

                <div class="form-group">
                    <label for="pharmacy_name">Pharmacy Name</label>
                    <input
                        type="text"
                        id="pharmacy_name"
                        name="pharmacy_name"
                        placeholder="Sharma Medical Store"
                        maxlength="150"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="ahmad@gmail.com"
                        autocomplete="email"
                        maxlength="255"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Minimum 8 characters"
                        autocomplete="new-password"
                        minlength="8"
                        required>
                </div>

                <button type="submit">
                    Create Account
                </button>

            </form>

            <p class="login-link">
                Already have an account?
                <a href="../login/login.html">Log In</a>
            </p>

        </section>
    </main>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="register.js"></script>

</body>
</html>
